- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:

    - name: Copy WAR file to Tomcat
      shell: |
        cp /var/snap/jenkins/5022/workspace/MavenAnsible/target/*.war /opt/tomcat/webapps/

    - name: Restart Tomcat
      shell: |
        /opt/tomcat/bin/shutdown.sh || true
        sleep 5
        /opt/tomcat/bin/startup.sh
